# Default test-time configuration for Mondrian's FoodMart fixture.
#
# Points at an embedded HSQLDB 1.8 database that is extracted from the
# mondrian-data-foodmart-hsql:0.1 test-scope dependency on first test run by
# mondrian.test.FoodMartHsqldbBootstrap. The extraction target is target/foodmart/.
#
# Developers who want Postgres/MySQL can override these values with their own
# mondrian.properties (PWD takes precedence over classpath).

mondrian.foodmart.jdbcURL=jdbc:hsqldb:file:target/foodmart/foodmart;shutdown=true
mondrian.foodmart.jdbcUser=sa
mondrian.foodmart.jdbcPassword=
mondrian.jdbcDrivers=org.hsqldb.jdbcDriver
mondrian.foodmart.catalogURL=file:demo/FoodMart.mondrian.xml
mondrian.test.jdbcURL=jdbc:hsqldb:file:target/foodmart/foodmart;shutdown=true
mondrian.test.jdbcUser=sa
mondrian.test.jdbcPassword=
